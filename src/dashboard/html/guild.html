<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Potato Game Bot — Guild Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1e1f22;
      --surface:   #2b2d31;
      --surface2:  #313338;
      --border:    #3f4147;
      --text:      #dbdee1;
      --muted:     #949ba4;
      --accent:    #5865f2;
      --accent-hv: #4752c4;
      --danger:    #ed4245;
      --success:   #23a55a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ── Nav ──────────────────────────────────────────────────────────────── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-left { display: flex; align-items: center; gap: 16px; }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      color: var(--text);
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .back-link:hover { color: var(--text); }

    .nav-actions { display: flex; align-items: center; gap: 12px; }
    #nav-username { font-size: 14px; color: var(--muted); }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Main ─────────────────────────────────────────────────────────────── */
    main { max-width: 720px; margin: 0 auto; padding: 32px 24px; }

    .page-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .guild-icon-lg {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .guild-icon-lg img { width: 100%; height: 100%; object-fit: cover; }

    .page-title { font-size: 22px; font-weight: 700; }
    .page-subtitle { color: var(--muted); font-size: 13px; margin-top: 2px; }

    /* ── Feature sections ─────────────────────────────────────────────────── */
    .feature-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .feature-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
    }
    .feature-header:hover { background: var(--surface2); }

    .feature-header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .feature-name { font-weight: 600; font-size: 15px; }

    .status-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 100px;
      font-weight: 600;
    }
    .status-pill.on  { background: rgba(35,165,90,.15);  color: var(--success); }
    .status-pill.off { background: rgba(237,66,69,.12);  color: var(--danger); }

    .chevron {
      color: var(--muted);
      font-size: 12px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .feature-section.open .chevron { transform: rotate(180deg); }

    .feature-body {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid var(--border);
    }
    .feature-section.open .feature-body { display: block; }

    /* ── Toggle switch ────────────────────────────────────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0 12px;
    }
    .toggle-label { font-size: 14px; color: var(--muted); }

    .toggle {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--border);
      border-radius: 24px;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    /* ── Channel input ────────────────────────────────────────────────────── */
    .channels-section { margin-top: 8px; }
    .channels-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .channel-tag-input {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      min-height: 42px;
      cursor: text;
    }
    .channel-tag-input:focus-within { border-color: var(--accent); }

    .channel-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .channel-tag button {
      background: none;
      border: none;
      color: rgba(255,255,255,.7);
      cursor: pointer;
      padding: 0;
      font-size: 13px;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .channel-tag button:hover { color: #fff; }

    .channel-input {
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 13px;
      outline: none;
      min-width: 120px;
      flex: 1;
    }
    .channel-input::placeholder { color: var(--muted); }

    .channels-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

    .extra-settings {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .extra-settings-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }
    .extra-field {
      margin-bottom: 10px;
    }
    .extra-field:last-child {
      margin-bottom: 0;
    }
    .extra-field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .extra-field input[type="number"] {
      width: 100%;
      max-width: 260px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
    }
    .extra-field input[type="number"]:focus {
      border-color: var(--accent);
    }
    .extra-field-hint {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
    }

    .wizard-settings {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .wizard-settings-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text);
    }
    .wizard-field {
      margin-bottom: 10px;
    }
    .wizard-field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .wizard-field input,
    .wizard-field select,
    .wizard-field textarea {
      width: 100%;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
    }
    .wizard-field textarea {
      min-height: 84px;
      resize: vertical;
      font-family: inherit;
    }
    .wizard-field input:focus,
    .wizard-field select:focus,
    .wizard-field textarea:focus {
      border-color: var(--accent);
    }
    .wizard-hint {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
    }
    .role-option-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .role-option-row {
      display: grid;
      grid-template-columns: 1.6fr 1fr 0.7fr auto;
      gap: 8px;
      align-items: center;
    }
    .btn-small {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-small:hover {
      border-color: var(--danger);
      color: var(--danger);
    }
    .btn-add {
      margin-top: 8px;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 12px;
      width: 100%;
      text-align: left;
    }
    .btn-add:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .btn-publish {
      margin-top: 10px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-publish:hover { border-color: var(--accent); }
    .btn-publish:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-save {
      margin-top: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 9px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: var(--accent-hv); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .save-feedback {
      font-size: 12px;
      margin-left: 10px;
      display: none;
    }
    .save-feedback.ok  { color: var(--success); }
    .save-feedback.err { color: var(--danger); }

    /* ── Loading / error states ───────────────────────────────────────────── */
    .state-msg { color: var(--muted); font-size: 14px; padding: 40px 0; text-align: center; }

    /* ── Super-admin debug panel ──────────────────────────────────────────── */
    #debug-panel {
      margin-top: 32px;
      background: #0d0e10;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    #debug-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #161719;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    #debug-panel-header:hover { background: #1a1c1f; }
    #debug-panel-title {
      font-size: 12px;
      font-weight: 700;
      color: #f0c040;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    #debug-panel-chevron { color: var(--muted); font-size: 11px; transition: transform 0.2s; }
    #debug-panel.open #debug-panel-chevron { transform: rotate(180deg); }
    #debug-log {
      display: none;
      font-family: 'Consolas', 'Menlo', monospace;
      font-size: 11.5px;
      line-height: 1.6;
      padding: 12px 16px;
      max-height: 480px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #c9d1d9;
    }
    #debug-panel.open #debug-log { display: block; }
    .dbg-time  { color: #6a737d; }
    .dbg-info  { color: #58a6ff; }
    .dbg-ok    { color: #3fb950; }
    .dbg-warn  { color: #d29922; }
    .dbg-error { color: #f85149; }
    .dbg-sep   { color: #30363d; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="/dashboard" class="nav-brand">🥔 Potato Game Bot</a>
      <a href="/dashboard" class="back-link">← Back to servers</a>
    </div>
    <div class="nav-actions">
      <span id="nav-username"></span>
      <form method="POST" action="/dashboard/logout">
        <button type="submit" class="btn-logout">Sign out</button>
      </form>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <div class="guild-icon-lg" id="guild-icon">…</div>
      <div>
        <div class="page-title" id="guild-name">Loading…</div>
        <div class="page-subtitle" id="guild-id-display"></div>
      </div>
    </div>

    <div id="features-container">
      <p class="state-msg">Loading settings…</p>
    </div>

    <!-- Super-admin debug panel (hidden until isSuperAdmin confirmed) -->
    <div id="debug-panel" style="display:none;">
      <div id="debug-panel-header">
        <span id="debug-panel-title">🛠 Super-Admin Debug Log</span>
        <span id="debug-panel-chevron">▼</span>
      </div>
      <pre id="debug-log"></pre>
    </div>
  </main>

  <script>
    // Extract guild ID from URL: /dashboard/guild/<guildId>
    const guildId = location.pathname.split('/').pop();
    const ROLE_MENU_MAX_OPTIONS = 20;

    function escHtml(str) {
      return String(str).replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // ── Super-admin debug logger ─────────────────────────────────────────────
    const debugPanel = document.getElementById('debug-panel');
    const debugLog   = document.getElementById('debug-log');

    document.getElementById('debug-panel-header').addEventListener('click', () => {
      debugPanel.classList.toggle('open');
    });

    function dbgNow() {
      return new Date().toISOString().replace('T', ' ').replace('Z', ' UTC');
    }

    function dbgAppend(cls, text) {
      const line = document.createElement('span');
      line.className = cls;
      line.textContent = text;
      debugLog.appendChild(line);
      debugLog.appendChild(document.createTextNode('\n'));
      debugLog.scrollTop = debugLog.scrollHeight;
    }

    const dbg = {
      info:  (msg) => dbgAppend('dbg-info',  `[${dbgNow()}] ℹ  ${msg}`),
      ok:    (msg) => dbgAppend('dbg-ok',    `[${dbgNow()}] ✓  ${msg}`),
      warn:  (msg) => dbgAppend('dbg-warn',  `[${dbgNow()}] ⚠  ${msg}`),
      error: (msg) => dbgAppend('dbg-error', `[${dbgNow()}] ✗  ${msg}`),
      sep:   ()    => dbgAppend('dbg-sep',   '─'.repeat(60)),
      raw:   (msg) => dbgAppend('dbg-time',  msg),
    };

    /** Wraps fetch() and logs request/response details to the debug panel. */
    async function dbgFetch(url, opts) {
      dbg.info(`${(opts && opts.method) || 'GET'} ${url}`);
      if (opts && opts.body) dbg.raw(`    body: ${opts.body}`);
      try {
        const r = await fetch(url, opts);
        const clone = r.clone();
        let body = '';
        try { body = await clone.text(); } catch { body = '<unreadable>'; }
        if (r.ok) {
          dbg.ok(`  → ${r.status} OK`);
        } else {
          dbg.error(`  → ${r.status} ${r.statusText}`);
          dbg.raw(`    response: ${body.slice(0, 500)}`);
        }
        // Return a new Response-like object with the already-read body
        return new Response(body, { status: r.status, statusText: r.statusText, headers: r.headers });
      } catch (err) {
        dbg.error(`  → Network error: ${err.message}`);
        throw err;
      }
    }

    function enableDebugPanel() {
      debugPanel.style.display = 'block';
      debugPanel.classList.add('open');
      dbg.sep();
      dbg.warn('Settings page debug mode — super-admin view');
      dbg.info(`Page loaded: ${location.href}`);
      dbg.sep();
    }

    // ── Channel tag input component ──────────────────────────────────────────
    function createChannelTagInput(containerOrId, initialIds) {
      const container = typeof containerOrId === 'string'
        ? document.getElementById(containerOrId)
        : containerOrId;
      let ids = [...(initialIds || [])];
      let activeInput = null;

      function tryAddChannel(rawValue) {
        const trimmed = String(rawValue || '').trim();
        if (!trimmed) return { ok: true, added: false };

        // Accept raw IDs, "#123...", and Discord channel mention format "<#123...>".
        const match = trimmed.match(/^<#?(\d+)>?$|^#?(\d+)$/);
        const channelId = (match && (match[1] || match[2])) || null;
        if (!channelId) return { ok: false, added: false };

        if (!ids.includes(channelId)) {
          ids.push(channelId);
          return { ok: true, added: true };
        }
        return { ok: true, added: false };
      }

      function render() {
        if (!container) return;
        container.innerHTML = '';
        for (const id of ids) {
          const tag = document.createElement('span');
          tag.className = 'channel-tag';
          tag.innerHTML = `<span>#${escHtml(id)}</span><button type="button" aria-label="Remove">&times;</button>`;
          tag.querySelector('button').onclick = () => {
            ids = ids.filter(x => x !== id);
            render();
            container.dispatchEvent(new Event('change'));
          };
          container.appendChild(tag);
        }
        const input = document.createElement('input');
        activeInput = input;
        input.className = 'channel-input';
        input.placeholder = ids.length ? '' : 'Paste channel ID and press Enter (leave empty for all channels)';
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter' && input.value.trim()) {
            e.preventDefault();
            const result = tryAddChannel(input.value);
            if (result.ok) {
              input.value = '';
              render();
              container.dispatchEvent(new Event('change'));
            } else {
              input.style.color = 'var(--danger)';
              setTimeout(() => { input.style.color = ''; }, 600);
            }
          }
        });
        container.appendChild(input);
        container.onclick = () => input.focus();
      }

      if (container) render();
      return {
        getIds: () => [...ids],
        commitPendingInput: () => {
          if (!activeInput || !activeInput.value.trim()) return { ok: true };
          const result = tryAddChannel(activeInput.value);
          if (!result.ok) return { ok: false };
          activeInput.value = '';
          render();
          container.dispatchEvent(new Event('change'));
          return { ok: true };
        },
      };
    }

    function buildSelectOptionsHtml(items, selectedId, placeholder) {
      const first = `<option value="">${escHtml(placeholder || 'Select...')}</option>`;
      const rest = (Array.isArray(items) ? items : []).map((item) => {
        const selected = String(item.id) === String(selectedId || '') ? 'selected' : '';
        return `<option value="${escHtml(item.id)}" ${selected}>${escHtml(item.name)}</option>`;
      }).join('');
      return `${first}${rest}`;
    }

    function buildRoleMenuWizard(root, feat, currentExtra, guildMeta, apiFetch) {
      if (!root) return null;
      const channels = Array.isArray(guildMeta?.channels) ? guildMeta.channels : [];
      const roles = Array.isArray(guildMeta?.roles) ? guildMeta.roles : [];
      const roleNameById = new Map(roles.map((r) => [String(r.id), r.name]));

      const safeRoleOptions = Array.isArray(currentExtra.roleOptions) && currentExtra.roleOptions.length
        ? currentExtra.roleOptions.slice(0, ROLE_MENU_MAX_OPTIONS)
        : [];

      root.innerHTML = `
        <div class="wizard-settings-title">Setup wizard</div>
        <div class="wizard-field">
          <label for="wizard-${feat.id}-menu-channel">Role menu channel</label>
          <select id="wizard-${feat.id}-menu-channel">
            ${buildSelectOptionsHtml(channels, currentExtra.menuChannelId, 'Select a channel')}
          </select>
          <div class="wizard-hint">Where the role-selection message will be posted.</div>
        </div>
        <div class="wizard-field">
          <label for="wizard-${feat.id}-title">Menu title</label>
          <input id="wizard-${feat.id}-title" type="text" value="${escHtml(currentExtra.title || 'Role Menu: Roles')}" />
        </div>
        <div class="wizard-field">
          <label for="wizard-${feat.id}-desc">Menu description</label>
          <input id="wizard-${feat.id}-desc" type="text" value="${escHtml(currentExtra.description || 'Use the buttons below to toggle your roles.')}" />
        </div>
        <div class="wizard-field">
          <label>Role options</label>
          <div class="role-option-list" id="wizard-${feat.id}-role-options"></div>
          <button type="button" class="btn-add" id="wizard-${feat.id}-add-role">+ Add role option</button>
          <div class="wizard-hint">Each option creates one button users can press to add/remove that role. Publish multiple times to keep multiple role menus active.</div>
        </div>
        <button type="button" class="btn-publish" id="wizard-${feat.id}-publish">Publish role menu message</button>
        <span class="save-feedback" id="wizard-${feat.id}-publish-feedback"></span>
      `;

      const optionsContainer = root.querySelector(`#wizard-${feat.id}-role-options`);
      const addRoleBtn = root.querySelector(`#wizard-${feat.id}-add-role`);
      const publishBtn = root.querySelector(`#wizard-${feat.id}-publish`);
      const publishFeedback = root.querySelector(`#wizard-${feat.id}-publish-feedback`);

      function makeRoleRow(option = {}) {
        const roleId = String(option.roleId || '');
        const roleName = roleNameById.get(roleId) || '';
        const label = String(option.label || roleName || '').trim();
        const emoji = String(option.emoji || '').trim();

        const row = document.createElement('div');
        row.className = 'role-option-row';
        row.innerHTML = `
          <select class="wizard-role-id">
            ${buildSelectOptionsHtml(roles, roleId, 'Select role')}
          </select>
          <input class="wizard-role-label" type="text" value="${escHtml(label)}" placeholder="Button label" />
          <input class="wizard-role-emoji" type="text" value="${escHtml(emoji)}" placeholder="Emoji" />
          <button type="button" class="btn-small">Remove</button>
        `;
        row.querySelector('.btn-small').addEventListener('click', () => {
          row.remove();
        });
        const roleSelect = row.querySelector('.wizard-role-id');
        const labelInput = row.querySelector('.wizard-role-label');
        roleSelect.addEventListener('change', () => {
          if (!labelInput.value.trim()) {
            labelInput.value = roleNameById.get(roleSelect.value) || '';
          }
        });
        optionsContainer.appendChild(row);
      }

      if (safeRoleOptions.length) {
        safeRoleOptions.forEach((option) => makeRoleRow(option));
      } else {
        makeRoleRow();
      }

      addRoleBtn.addEventListener('click', () => {
        if (optionsContainer.querySelectorAll('.role-option-row').length >= ROLE_MENU_MAX_OPTIONS) return;
        makeRoleRow();
      });

      publishBtn.addEventListener('click', async () => {
        publishBtn.disabled = true;
        publishFeedback.style.display = 'none';
        try {
          const response = await (apiFetch || fetch)(`/dashboard/api/guilds/${guildId}/role-menu/publish`, {
            method: 'POST',
          });
          if (!response.ok) {
            const payload = await response.json().catch(() => ({}));
            throw new Error(payload.error || `HTTP ${response.status}`);
          }
          const payload = await response.json().catch(() => ({}));
          publishFeedback.textContent = `✓ Published (channel ID: ${payload.channelId})`;
          publishFeedback.className = 'save-feedback ok';
          publishFeedback.style.display = 'inline';
        } catch (err) {
          publishFeedback.textContent = `✗ Publish failed: ${err.message}`;
          publishFeedback.className = 'save-feedback err';
          publishFeedback.style.display = 'inline';
        } finally {
          publishBtn.disabled = false;
        }
      });

      return {
        getExtra(isEnabled) {
          const menuChannelId = root.querySelector(`#wizard-${feat.id}-menu-channel`)?.value?.trim() || null;
          const title = root.querySelector(`#wizard-${feat.id}-title`)?.value?.trim() || 'Role Menu: Roles';
          const description = root.querySelector(`#wizard-${feat.id}-desc`)?.value?.trim() || 'Use the buttons below to toggle your roles.';
          const roleOptions = [];

          root.querySelectorAll('.role-option-row').forEach((row) => {
            const roleId = row.querySelector('.wizard-role-id')?.value?.trim() || '';
            const roleLabel = row.querySelector('.wizard-role-label')?.value?.trim() || '';
            const roleEmoji = row.querySelector('.wizard-role-emoji')?.value?.trim() || '';
            if (!roleId) return;
            roleOptions.push({
              roleId,
              label: roleLabel || roleNameById.get(roleId) || 'Role',
              emoji: roleEmoji || null,
              style: 'secondary',
            });
          });

          if (isEnabled) {
            if (!menuChannelId) return { ok: false, message: 'Role menu channel is required.' };
            if (!roleOptions.length) return { ok: false, message: 'Add at least one role option.' };
          }

          const extra = {
            menuChannelId,
            title,
            description,
            roleOptions,
          };
          if (Array.isArray(currentExtra.roleMenus)) {
            extra.roleMenus = currentExtra.roleMenus;
          }
          if (currentExtra.roleMenuMessageId) {
            extra.roleMenuMessageId = currentExtra.roleMenuMessageId;
          }
          return { ok: true, extra };
        },
      };
    }

    function buildWelcomeAutomationWizard(root, feat, currentExtra, guildMeta) {
      if (!root) return null;
      const channels = Array.isArray(guildMeta?.channels) ? guildMeta.channels : [];
      const roles = Array.isArray(guildMeta?.roles) ? guildMeta.roles : [];
      const templates = Array.isArray(currentExtra.templates) && currentExtra.templates.length
        ? currentExtra.templates.join('\n')
        : '';
      const joinPromptGuidance = (currentExtra.joinPromptGuidance || '').trim();
      const roleGrantPromptGuidance = (currentExtra.roleGrantPromptGuidance || '').trim();

      root.innerHTML = `
        <div class="wizard-settings-title">Setup wizard</div>
        <div class="wizard-field">
          <label for="wizard-${feat.id}-trigger-phrase">Trigger phrase</label>
          <input id="wizard-${feat.id}-trigger-phrase" type="text" value="${escHtml(currentExtra.triggerPhrase || 'welcome')}" />
          <div class="wizard-hint">Automation runs when an admin message contains this phrase and mentions a member.</div>
        </div>
        <div class="wizard-field">
          <label for="wizard-${feat.id}-trigger-channel">Introduce-yourself channel</label>
          <select id="wizard-${feat.id}-trigger-channel">
            ${buildSelectOptionsHtml(channels, currentExtra.triggerChannelId, 'Select a channel')}
          </select>
        </div>
        <div class="wizard-field">
          <label for="wizard-${feat.id}-grant-role">Welcome/base role to grant</label>
          <select id="wizard-${feat.id}-grant-role">
            ${buildSelectOptionsHtml(roles, currentExtra.grantRoleId, 'Select a role')}
          </select>
        </div>
        <div class="wizard-field">
          <label for="wizard-${feat.id}-roles-channel">Role-selection channel</label>
          <select id="wizard-${feat.id}-roles-channel">
            ${buildSelectOptionsHtml(channels, currentExtra.roleMenuChannelId, 'Select a channel')}
          </select>
        </div>
        <div class="wizard-field">
          <label for="wizard-${feat.id}-join-prompt-guidance">Join welcome AI prompt guidance (optional)</label>
          <textarea id="wizard-${feat.id}-join-prompt-guidance" placeholder="Ask them to introduce themselves in the introduce channel, keep it friendly and short.">${escHtml(joinPromptGuidance)}</textarea>
          <div class="wizard-hint">Used for member-join welcome posts. Base rules are always enforced automatically.</div>
        </div>
        <div class="wizard-field">
          <label for="wizard-${feat.id}-role-grant-prompt-guidance">Role-grant AI prompt guidance (optional)</label>
          <textarea id="wizard-${feat.id}-role-grant-prompt-guidance" placeholder="Tell them their base role was granted and direct them to the roles channel to pick game roles.">${escHtml(roleGrantPromptGuidance)}</textarea>
          <div class="wizard-hint">Used after admins welcome someone and their base role is granted. Base rules are always enforced automatically.</div>
        </div>
        <div class="wizard-field">
          <label class="toggle-label">
            <input id="wizard-${feat.id}-auto-welcome-enabled" type="checkbox" ${currentExtra.autoWelcomeEnabled !== false ? 'checked' : ''} />
            Auto-welcome new members when they join
          </label>
          <div class="wizard-hint">Sends an AI welcome in the introduce-yourself channel without requiring an admin trigger message.</div>
        </div>
        <div class="wizard-field">
          <label for="wizard-${feat.id}-templates">Welcome message templates (optional, one per line, use %s for mention)</label>
          <textarea id="wizard-${feat.id}-templates" placeholder="%s, welcome to the server!">${escHtml(templates)}</textarea>
          <div class="wizard-hint">If empty, built-in game-themed messages are used.</div>
        </div>
      `;

      return {
        getExtra(isEnabled) {
          const triggerPhrase = root.querySelector(`#wizard-${feat.id}-trigger-phrase`)?.value?.trim() || 'welcome';
          const triggerChannelId = root.querySelector(`#wizard-${feat.id}-trigger-channel`)?.value?.trim() || null;
          const grantRoleId = root.querySelector(`#wizard-${feat.id}-grant-role`)?.value?.trim() || null;
          const roleMenuChannelId = root.querySelector(`#wizard-${feat.id}-roles-channel`)?.value?.trim() || null;
          const joinPromptGuidance = root.querySelector(`#wizard-${feat.id}-join-prompt-guidance`)?.value?.trim() || null;
          const roleGrantPromptGuidance = root.querySelector(`#wizard-${feat.id}-role-grant-prompt-guidance`)?.value?.trim() || null;
          const autoWelcomeEnabled = !!root.querySelector(`#wizard-${feat.id}-auto-welcome-enabled`)?.checked;
          const rawTemplates = root.querySelector(`#wizard-${feat.id}-templates`)?.value || '';
          const templates = rawTemplates.split('\n').map((line) => line.trim()).filter(Boolean).slice(0, 30);

          if (isEnabled) {
            if (!triggerPhrase) return { ok: false, message: 'Trigger phrase is required.' };
            if (!triggerChannelId) return { ok: false, message: 'Introduce-yourself channel is required.' };
            if (!grantRoleId) return { ok: false, message: 'Welcome/base role is required.' };
            if (!roleMenuChannelId) return { ok: false, message: 'Role-selection channel is required.' };
          }

          return {
            ok: true,
            extra: {
              triggerPhrase,
              triggerChannelId,
              grantRoleId,
              roleMenuChannelId,
              joinPromptGuidance,
              roleGrantPromptGuidance,
              autoWelcomeEnabled,
              templates,
            },
          };
        },
      };
    }

    function buildFeatureWizard(root, feat, currentExtra, guildMeta, apiFetch) {
      if (!root || !feat?.wizardType) return null;
      if (feat.wizardType === 'rolemenu') {
        return buildRoleMenuWizard(root, feat, currentExtra, guildMeta, apiFetch);
      }
      if (feat.wizardType === 'welcomeautomation') {
        return buildWelcomeAutomationWizard(root, feat, currentExtra, guildMeta);
      }
      return null;
    }

    // ── Build feature section ────────────────────────────────────────────────
    function buildFeatureSection(feat, settings, guildMeta, isSuperAdmin, apiFetch) {
      const safeSettings = settings && typeof settings === 'object' ? settings : {};
      const rawCurrent = safeSettings[feat.id];
      const current = rawCurrent && typeof rawCurrent === 'object'
        ? rawCurrent
        : { enabled: feat.defaultEnabled === true, channelIds: null };
      const safeChannelIds = Array.isArray(current.channelIds) ? current.channelIds : null;
      const currentExtra = current.extra && typeof current.extra === 'object' ? current.extra : {};
      const extraFields = Array.isArray(feat.extraFields) ? feat.extraFields : [];

      const section = document.createElement('div');
      section.className = 'feature-section';
      section.dataset.featureId = feat.id;

      const statusClass = current.enabled ? 'on'  : 'off';
      const statusText  = current.enabled ? 'ON'  : 'OFF';
      const channelCount = safeChannelIds?.length;
      const channelSub = channelCount
        ? `${channelCount} channel${channelCount !== 1 ? 's' : ''} restricted`
        : 'All channels';

      section.innerHTML = `
        <div class="feature-header">
          <div class="feature-header-left">
            <span class="feature-name">${escHtml(feat.label)}</span>
            <span class="status-pill ${statusClass}" id="pill-${feat.id}">${statusText}</span>
          </div>
          <span class="channels-hint" id="ch-summary-${feat.id}" style="color:var(--muted);font-size:12px;">${escHtml(channelSub)}</span>
          <span class="chevron">▼</span>
        </div>
        <div class="feature-body">
          <div class="toggle-row">
            <label class="toggle">
              <input type="checkbox" id="toggle-${feat.id}" ${current.enabled ? 'checked' : ''} />
              <span class="slider"></span>
            </label>
            <span class="toggle-label">Enable ${escHtml(feat.label)}</span>
          </div>
          ${feat.hasChannels ? `
          <div class="channels-section">
            <div class="channels-label">Restrict to channels (leave empty for all channels):</div>
            <div class="channel-tag-input" id="ch-input-${feat.id}"></div>
            <div class="channels-hint">Enter a Discord channel ID and press <kbd>Enter</kbd> to add it.</div>
          </div>` : ''}
          ${extraFields.length ? `
          <div class="extra-settings">
            <div class="extra-settings-title">Advanced settings (override env defaults for this server)</div>
            ${extraFields.map((field) => {
              const rawValue = currentExtra[field.key];
              const numericValue = Number(rawValue);
              const value = Number.isFinite(numericValue)
                ? String(Math.trunc(numericValue))
                : String(field.defaultValue ?? '');
              return `
                <div class="extra-field">
                  <label for="extra-${feat.id}-${field.key}">${escHtml(field.label)}</label>
                  <input
                    type="number"
                    id="extra-${feat.id}-${field.key}"
                    data-extra-key="${escHtml(field.key)}"
                    min="${Number.isFinite(Number(field.min)) ? Number(field.min) : 0}"
                    value="${escHtml(value)}"
                  />
                  <div class="extra-field-hint">${escHtml(field.hint || '')} Default: <code>${escHtml(String(field.defaultValue ?? ''))}</code></div>
                </div>
              `;
            }).join('')}
          </div>` : ''}
          ${feat.wizardType ? `<div class="wizard-settings" id="wizard-${feat.id}"></div>` : ''}
          <div style="display:flex;align-items:center;margin-top:14px;">
            <button class="btn-save" id="save-${feat.id}">Save</button>
            <span class="save-feedback" id="feedback-${feat.id}"></span>
          </div>
        </div>
      `;

      // Toggle collapse
      section.querySelector('.feature-header').addEventListener('click', () => {
        section.classList.toggle('open');
      });

      // Update pill on toggle change
      const toggleInput = section.querySelector(`#toggle-${feat.id}`);
      toggleInput.addEventListener('change', () => {
        const pill = section.querySelector(`#pill-${feat.id}`);
        pill.textContent = toggleInput.checked ? 'ON' : 'OFF';
        pill.className   = `status-pill ${toggleInput.checked ? 'on' : 'off'}`;
      });

      // Build channel tag input if applicable
      let channelTagInput = null;
      if (feat.hasChannels) {
        const channelContainer = section.querySelector(`#ch-input-${feat.id}`);
        channelTagInput = createChannelTagInput(channelContainer, safeChannelIds);

        // Update summary on change
        channelContainer?.addEventListener('change', () => {
          const ids = channelTagInput.getIds();
          const summary = section.querySelector(`#ch-summary-${feat.id}`);
          if (summary) {
            summary.textContent = ids.length
              ? `${ids.length} channel${ids.length !== 1 ? 's' : ''} restricted`
              : 'All channels';
          }
        });
      }

      const wizardRoot = section.querySelector(`#wizard-${feat.id}`);
      const wizardState = buildFeatureWizard(wizardRoot, feat, currentExtra, guildMeta, apiFetch);

      // Save button
      section.querySelector(`#save-${feat.id}`).addEventListener('click', async () => {
        const btn      = section.querySelector(`#save-${feat.id}`);
        const feedback = section.querySelector(`#feedback-${feat.id}`);
        btn.disabled   = true;
        feedback.style.display = 'none';

        if (channelTagInput) {
          const pending = channelTagInput.commitPendingInput();
          if (!pending.ok) {
            feedback.textContent   = '✗ Invalid channel ID in input';
            feedback.className     = 'save-feedback err';
            feedback.style.display = 'inline';
            btn.disabled = false;
            return;
          }
        }

        const extra = {};
        for (const field of extraFields) {
          const input = section.querySelector(`#extra-${feat.id}-${field.key}`);
          if (!input) continue;
          const parsed = Number.parseInt(input.value, 10);
          const min = Number.isFinite(Number(field.min)) ? Number(field.min) : 0;
          if (!Number.isFinite(parsed) || parsed < min) {
            feedback.textContent   = `✗ ${field.label} must be ≥ ${min}`;
            feedback.className     = 'save-feedback err';
            feedback.style.display = 'inline';
            input.focus();
            btn.disabled = false;
            return;
          }
          extra[field.key] = parsed;
        }

        const isEnabled = section.querySelector(`#toggle-${feat.id}`).checked;
        if (wizardState) {
          const wizardResult = wizardState.getExtra(isEnabled);
          if (!wizardResult.ok) {
            feedback.textContent = `✗ ${wizardResult.message}`;
            feedback.className = 'save-feedback err';
            feedback.style.display = 'inline';
            btn.disabled = false;
            return;
          }
          Object.assign(extra, wizardResult.extra || {});
        }

        const payload = {
          feature:    feat.id,
          enabled:    isEnabled,
          channelIds: channelTagInput ? channelTagInput.getIds() : null,
          extra:      Object.keys(extra).length ? extra : null,
        };

        if (isSuperAdmin) {
          dbg.sep();
          dbg.info(`Saving feature "${feat.id}"…`);
        }

        try {
          const r = await (apiFetch || fetch)(`/dashboard/api/guilds/${guildId}/features`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload),
          });

          if (r.ok) {
            feedback.textContent    = '✓ Saved';
            feedback.className      = 'save-feedback ok';
            feedback.style.display  = 'inline';
            setTimeout(() => { feedback.style.display = 'none'; }, 2500);
            if (isSuperAdmin) dbg.ok(`Feature "${feat.id}" saved successfully`);
          } else {
            throw new Error(`HTTP ${r.status}`);
          }
        } catch (err) {
          feedback.textContent   = `✗ Save failed: ${err.message}`;
          feedback.className     = 'save-feedback err';
          feedback.style.display = 'inline';
          if (isSuperAdmin) dbg.error(`Save failed for "${feat.id}": ${err.message}`);
        } finally {
          btn.disabled = false;
        }
      });

      return section;
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    async function init() {
      // Load current user info and check super-admin status
      let isSuperAdmin = false;
      try {
        const me = await fetch('/dashboard/api/me').then(r => r.json());
        document.getElementById('nav-username').textContent = me.username;
        isSuperAdmin = !!me.isSuperAdmin;
        if (isSuperAdmin) {
          enableDebugPanel();
          dbg.info(`Logged in as: ${me.username} (${me.userId}) — super-admin: true`);
          dbg.sep();
        }
      } catch (err) {
        /* /api/me failed — we can't confirm super-admin status, debug panel stays hidden */
      }

      // Use debug-aware fetch for super-admins, plain fetch otherwise
      const apiFetch = isSuperAdmin ? dbgFetch : fetch;

      const container = document.getElementById('features-container');

      try {
        if (isSuperAdmin) dbg.info('Fetching guild data, features list, and guilds list…');

        const [guildData, features, guilds, guildMeta] = await Promise.all([
          apiFetch(`/dashboard/api/guilds/${guildId}`).then(r => {
            if (r.status === 401) { location.href = '/dashboard/login'; throw new Error('unauth'); }
            if (r.status === 403) { location.href = '/dashboard'; throw new Error('forbidden'); }
            return r.json();
          }),
          apiFetch('/dashboard/api/features').then(r => r.json()),
          apiFetch('/dashboard/api/guilds').then(r => {
            if (r.status === 401) { location.href = '/dashboard/login'; throw new Error('Unauthorized: redirecting to login'); }
            return r.json();
          }),
          apiFetch(`/dashboard/api/guilds/${guildId}/meta`).then(r => {
            if (r.status === 401) { location.href = '/dashboard/login'; throw new Error('unauth'); }
            if (r.status === 403) { location.href = '/dashboard'; throw new Error('forbidden'); }
            return r.json();
          }),
        ]);

        if (isSuperAdmin) {
          dbg.sep();
          dbg.ok('All API calls completed successfully');
          dbg.raw(`  guildData: ${JSON.stringify(guildData).slice(0, 400)}`);
          dbg.raw(`  features:  ${JSON.stringify(features).slice(0, 200)}`);
          dbg.raw(`  guilds:    ${JSON.stringify(guilds).slice(0, 200)}`);
          dbg.sep();
        }

        // Populate guild header
        const guild = guilds.find(g => g.id === guildId);
        if (guild) {
          document.getElementById('guild-name').textContent = guild.name;
          document.getElementById('guild-id-display').textContent = `ID: ${guild.id}`;
          const iconEl = document.getElementById('guild-icon');
          if (guild.icon) {
            iconEl.innerHTML = `<img src="https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png?size=64" alt="" />`;
          } else {
            iconEl.textContent = guild.name.charAt(0).toUpperCase();
          }
          document.title = `${guild.name} — Potato Game Bot`;
          if (isSuperAdmin) dbg.ok(`Guild resolved: "${guild.name}" (${guild.id})`);
        } else {
          if (isSuperAdmin) dbg.warn(`Guild ID "${guildId}" not found in guilds list — guildData.features will still be used`);
        }

        container.innerHTML = '';

        for (const feat of features) {
          const section = buildFeatureSection(feat, guildData.features, guildMeta, isSuperAdmin, apiFetch);
          container.appendChild(section);
        }

        if (isSuperAdmin) {
          dbg.sep();
          dbg.ok(`Rendered ${features.length} feature section(s)`);
        }
      } catch (err) {
        if (isSuperAdmin) {
          dbg.sep();
          dbg.error(`Init error: ${err.message}`);
          if (err.stack) dbg.raw(err.stack);
        }
        if (err.message !== 'unauth' && err.message !== 'forbidden') {
          container.innerHTML = '<p class="state-msg">Failed to load settings. Please try refreshing.</p>';
        }
      }
    }

    init();
  </script>
</body>
</html>
