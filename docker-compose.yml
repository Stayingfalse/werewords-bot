version: '3.9'

services:
  werewords-bot:
    build: .
    platform: linux/arm64
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      CLIENT_ID: ${CLIENT_ID}
      # ── SassyBot AI features (optional) ──────────────────────────────────
      # Uncomment and configure to enable Gemini-powered sassy replies and
      # interjections. See .env.example for full documentation.
      # SASSY_ENABLED: "true"
      # GEMINI_API_KEY: ${GEMINI_API_KEY}
      # GEMINI_MODEL: gemini-2.0-flash
      # MAX_HISTORY_TURNS: "20"
      # COOLDOWN_MS: "2000"
      # INTERJECT_COOLDOWN: "180000"
      # ACTIVITY_WINDOW_MS: "60000"
      # INTERJECT_CHANNELS: ""
      # ── DeepSeek AI (optional second provider, enables load balancing) ────
      # DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      # DEEPSEEK_MODEL: deepseek-chat
      # ── MCP context server ────────────────────────────────────────────────
      # Starts automatically when SASSY_ENABLED=true.
      # MCP_ENABLED: "true"
      # MCP_SERVER_PORT: "3100"
      # CONTEXT_LOG_RETENTION_DAYS: "30"
      # ── Admin Dashboard (optional) ────────────────────────────────────────
      # Uncomment and configure to enable the web admin dashboard.
      # See .env.example for full documentation.
      # DASHBOARD_ENABLED: "true"
      # DASHBOARD_PORT: "3200"
      # DASHBOARD_URL: "http://your-server-ip-or-domain:3200"
      # DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      # SUPER_ADMIN_IDS: ${SUPER_ADMIN_IDS}
      # DASHBOARD_SESSION_SECRET: ${DASHBOARD_SESSION_SECRET}
    volumes:
      - ./data:/app/data
    ports:
      # Expose the MCP context server port so external MCP clients (e.g.
      # Claude Desktop) can connect. Remove this section if you don't need
      # external access — the bot container can reach it on localhost:3100.
      - "3100:3100"
      # Expose the admin dashboard port.  Set DASHBOARD_ENABLED=true to activate.
      # Change the host port (left side) if 3200 is already in use.
      - "3200:3200"
